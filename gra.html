<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>ziutki</title>

<style>

body{
font-family:Arial;
background:#121212;
color:white;
margin:0;
}

#playerContainer{
width:200px;
margin:20px auto;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

#imageBox{
width:100%;
height:150px;
background-size:cover;
background-position:center;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
}

#imageBox img{
width:100%;
height:100%;
object-fit:contain;
}

#petName{
font-weight:bold;
color:#ffd700;
cursor:pointer;
}

#playerInfo{
font-size:14px;
font-weight:bold;
line-height:1.5;
}

#expBarContainer{
width:100%;
height:15px;
background:#555;
border-radius:10px;
overflow:hidden;
}

#expBar{
height:100%;
width:0%;
background:linear-gradient(90deg,limegreen,green);
transition:width 0.4s;
}

.content{
text-align:center;
padding-bottom:40px;
}

#challengeList{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
margin-top:10px;
}

#challengeList div{
background:#1e1e1e;
padding:8px;
border-radius:8px;
display:flex;
gap:8px;
align-items:center;
}

.inventoryItem{
margin:10px;
padding:10px;
background:#1e1e1e;
border-radius:10px;
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
width:120px;
}

.inventoryItem img{
width:60px;
}

#gameInventory{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

#backgroundInventory{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:8px;
margin:4px;
background:#444;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#666;
}

</style>
</head>

<body>

<div id="playerContainer">

<div id="imageBox"></div>

<div id="petName" onclick="editName()">Kliknij aby nazwać</div>

<div id="playerInfo"></div>

<div id="expBarContainer">
<div id="expBar"></div>
</div>

<button onclick="resetSkin()">Klasyczna postać</button>
<button onclick="resetBackground()">Klasyczne tło</button>

</div>


<div class="content">

<h1>Twoje zadania</h1>

<input id="challengeInput">
<button onclick="addChallenge()">Dodaj</button>

<div id="challengeList"></div>

<div id="message"></div>

<h2>Ekwipunek</h2>

<div id="gameInventory"></div>

<h3>Tła</h3>
<div id="backgroundInventory"></div>





<button onclick="openShop()">Sklep</button>

</div>



<script>

const imageBox=document.getElementById("imageBox")
const playerInfo=document.getElementById("playerInfo")
const challengeList=document.getElementById("challengeList")
const expBar=document.getElementById("expBar")
const petNameBox=document.getElementById("petName")

let character
let level
let exp
let skillPoints
let challenges=[]

const EXP_TO_LEVEL=100



const shopItems=[

{name:"bialy lis",skin:"Gemini_Generated_Image_yplakyplakyplaky-removebg-preview.png"},
{name:"lisek w czapce P",skin:"Gemini_Generated_Image_3qswbr3qswbr3qsw-removebg-preview.png"},
{name:"lisek w czapce zimowej",skin:"Gemini_Generated_Image_fgrfi0fgrfi0fgrf-removebg-preview.png"},
{name:"lisek na 2 nogach w czapce",skin:"Gemini_Generated_Image_g12vj5g12vj5g12v-removebg-preview.png"},
{name:"bialy lis z niebieskimi oczami",skin:"Gemini_Generated_Image_tlazq4tlazq4tlaz-removebg-preview.png"},
{name:"niebieski robo-lis",skin:"Gemini_Generated_Image_dwykirdwykirdwyk-removebg-preview.png"},
{name:"robo-lis.01",skin:"Gemini_Generated_Image_utr9aputr9aputr9-removebg-preview.png"},
{name:"robo-lis.02",skin:"Gemini_Generated_Image_l9is0tl9is0tl9is-removebg-preview.png"}

]


window.onload=function(){

character=localStorage.getItem("selectedCharacter")||"kot"

level=parseInt(localStorage.getItem("level_"+character))||1
exp=parseInt(localStorage.getItem("exp_"+character))||0
skillPoints=parseInt(localStorage.getItem("skillPoints_"+character))||0

const savedName=localStorage.getItem("petName_"+character)
if(savedName) petNameBox.innerText=savedName

loadCharacter()
loadBackground()
loadBackgroundInventory()
updateUI()
loadInventory()
loadChallenges()

}




function getDefaultSkin(){

if(character==="kot")
return "Gemini_Generated_Image_dbamlbdbamlbdbam-removebg-preview.png"

if(character==="pies")
return "Gemini_Generated_Image_1gv5471gv5471gv5-removebg-preview.png"

if(character==="lis")
return "Gemini_Generated_Image_ahddp8ahddp8ahdd-removebg-preview.png"

if(character==="akselotl")
return "Gemini_Generated_Image_m1v7eqm1v7eqm1v7-removebg-preview.png"

}

function loadCharacter(){

const savedSkin=localStorage.getItem("playerImage_"+character)

if(savedSkin){

imageBox.innerHTML=`<img src="${savedSkin}">`

}else{

imageBox.innerHTML=`<img src="${getDefaultSkin()}">`

}

}

function resetSkin(){

localStorage.removeItem("playerImage_"+character)
loadCharacter()

}


function editName(){

let name=prompt("Podaj imię")

if(name){

petNameBox.innerText=name
localStorage.setItem("petName_"+character,name)

}

}




function updateUI(){

let percent=(exp/EXP_TO_LEVEL)*100

playerInfo.innerHTML=`

${character}<br>
Level ${level}<br>
EXP ${exp}/${EXP_TO_LEVEL}<br>
⭐ ${skillPoints}

`

expBar.style.width=percent+"%"

}


function addChallenge(){

const input=document.getElementById("challengeInput")
const text=input.value.trim()

if(text==="")return

challenges.push(text)

saveChallenges()
renderChallenges()

input.value=""

}

function renderChallenges(){

    challengeList.innerHTML="";

    challenges.forEach((text,index)=>{

        const item=document.createElement("div");

        const done=document.createElement("button");
        done.innerText="✔ "+text+" (+10 EXP)";
        done.onclick=function(){
            completeChallenge(index);
        };

        const del=document.createElement("button");
        del.innerText="❌ Usuń";
        del.onclick=function(){
            challenges.splice(index,1);
            saveChallenges();
            renderChallenges();
        };

        item.appendChild(done);
        item.appendChild(del);

        challengeList.appendChild(item);

    });

}

function completeChallenge(index){

exp+=10

while(exp>=EXP_TO_LEVEL){

exp-=EXP_TO_LEVEL
level++
skillPoints++

}

challenges.splice(index,1)

saveGame()
saveChallenges()

updateUI()
renderChallenges()

}




function saveGame(){

localStorage.setItem("level_"+character,level)
localStorage.setItem("exp_"+character,exp)
localStorage.setItem("skillPoints_"+character,skillPoints)
localStorage.setItem("shopPoints",skillPoints)

}

function saveChallenges(){

localStorage.setItem("challenges",JSON.stringify(challenges))

}

function loadChallenges(){

const saved=JSON.parse(localStorage.getItem("challenges"))

if(saved) challenges=saved

renderChallenges()

}



function loadInventory(){

const inventory=JSON.parse(localStorage.getItem("inventory_"+character))||[]

const box=document.getElementById("gameInventory")

box.innerHTML=""

inventory.forEach(name=>{

const itemData=shopItems.find(i=>i.name===name)
if(!itemData)return

const div=document.createElement("div")
div.className="inventoryItem"

div.innerHTML=`

<img src="${itemData.skin}">
<br>
${itemData.name}
<br>
<button onclick="useItem('${itemData.skin}')">Użyj</button>

`

box.appendChild(div)

})

}

function useItem(skin){

localStorage.setItem("playerImage_"+character,skin)
loadCharacter()

}



const backgroundItems = {

"Las":"Gemini_Generated_Image_fyjik0fyjik0fyji.png",
"Ocean":"Gemini_Generated_Image_zl545zl545zl545z.png",
"Droga jaskolki":"Gemini_Generated_Image_2zwcof2zwcof2zwc.png",
"Galaktyka":"Gemini_Generated_Image_3h90lg3h90lg3h90.png",
"Gwiazda komunizmu":"Gemini_Generated_Image_4guhat4guhat4guh.png",
"Statek":"Gemini_Generated_Image_21tdb521tdb521td.png",
"Kosmos":"Gemini_Generated_Image_76mdhl76mdhl76md.png",
"Pierwsza brama":"Gemini_Generated_Image_82xpar82xpar82xp.png",
"BEAST'S CAVERN":"Gemini_Generated_Image_bjds1fbjds1fbjds.png",
"Las energi":"Gemini_Generated_Image_fzb46sfzb46sfzb4.png",
"Cyberpunk 2077":"Gemini_Generated_Image_je149zje149zje14.png",
"Rozbity statek":"Gemini_Generated_Image_losd0plosd0plosd.png",
"Czerwone drzewo":"Gemini_Generated_Image_n665wqn665wqn665.png",
"Dom japonski":"Gemini_Generated_Image_tdtjzhtdtjzhtdtj.png",
"Ostatnia brama":"Gemini_Generated_Image_voucx5voucx5vouc.png",
"Cyberpunk 2077.02":"Gemini_Generated_Image_x5gl0bx5gl0bx5gl.png",
"Jama":"Gemini_Generated_Image_x8zgsxx8zgsxx8zg.png",
"THE WITHCHER":"Gemini_Generated_Image_xwd9ubxwd9ubxwd9.png",
"Sierp i mlot":"Gemini_Generated_Image_y4lzd2y4lzd2y4lz.png",
"Pod wodny skarb":"Gemini_Generated_Image_yugpmjyugpmjyugp.png",
"Basen":"Gemini_Generated_Image_z0ysy8z0ysy8z0ys.png",

}



function goToShop(){

localStorage.setItem("shopPoints",skillPoints)
window.location.href="sklep.html"

}
function setBackground(name){

const img = backgroundItems[name]

if(!img) return

imageBox.style.backgroundImage = "url('"+img+"')"

localStorage.setItem("playerBackground_"+character,name)

}

function resetBackground(){

localStorage.removeItem("playerBackground_"+character)
imageBox.style.backgroundImage="url('Gemini_Generated_Image_ucyn9nucyn9nucyn.png')"

}

function loadBackground(){

const name = localStorage.getItem("playerBackground_"+character)

if(name && backgroundItems[name]){

imageBox.style.backgroundImage = "url('"+backgroundItems[name]+"')"

}else{

imageBox.style.backgroundImage = "url('Gemini_Generated_Image_ucyn9nucyn9nucyn.png')"

}

}

function loadBackgroundInventory(){

const bgInv = JSON.parse(localStorage.getItem("bgInventory_"+character)) || []

const box = document.getElementById("backgroundInventory")

box.innerHTML = ""

bgInv.forEach(name => {

const img = backgroundItems[name]

if(!img) return

const div = document.createElement("div")
div.className="inventoryItem"

div.innerHTML = `

<img src="${img}">
<br>
${name}
<br>
<button onclick="setBackground('${name}')">Użyj tła</button>

`

box.appendChild(div)

})

}

function openShop(){

let character = localStorage.getItem("selectedCharacter")

if(character==="kot"){
window.location.href="sklep_kot.html"
}

if(character==="pies"){
window.location.href="sklep_pies.html"
}

if(character==="lis"){
window.location.href="sklep_lis.html"
}

if(character==="akselotl"){
window.location.href="sklep_akselotl.html"
}

}





</script>

</body>

</html>
