]

let character=localStorage.getItem("selectedCharacter")||"Gracz"

let inventory=JSON.parse(localStorage.getItem("inventory_"+character))||[]

let points=parseInt(localStorage.getItem("shopPoints"))||0

document.getElementById("points").innerText=points

const store=document.getElementById("store")

function render(){

store.innerHTML=""


items.forEach(item=>{

const owned=inventory.includes(item.name)

const div=document.createElement("div")

div.className="item"

div.innerHTML=`
<img src="${item.img}">
<h3>${item.name}</h3>
<p>${item.price} pkt</p>
<button ${owned||points<item.price?"disabled":""} onclick="buy(${item.id})">
${owned?"Posiadany":"Kup"}
</button>
`

store.appendChild(div)

})


backgrounds.forEach(bg=>{

const bgInventory = JSON.parse(localStorage.getItem("bgInventory_"+character)) || []

const owned=bgInventory.includes(bg.name)
const div=document.createElement("div")
div.className="item"
div.innerHTML=`
<img src="${bg.img}">
<h3>${bg.name}</h3>
<p>${bg.price} pkt</p>
<button ${owned||points<bg.price?"disabled":""} onclick="buyBackground(${bg.id})">
${owned?"Posiadany":"Kup"}
</button>
`
store.appendChild(div)
})

}

function buy(id){

const item=items.find(i=>i.id===id)

if(points<item.price)return

points-=item.price

inventory.push(item.name)

localStorage.setItem("inventory_"+character,JSON.stringify(inventory))

localStorage.setItem("shopPoints",points)

localStorage.setItem("skillPoints_"+character,points)

document.getElementById("points").innerText=points

render()

}


function buyBackground(id){

const bg=backgrounds.find(b=>b.id===id)

if(points<bg.price)return

points-=bg.price


let bgInventory = JSON.parse(localStorage.getItem("bgInventory_"+character)) || []

bgInventory.push(bg.name)

localStorage.setItem("bgInventory_"+character,JSON.stringify(bgInventory))

localStorage.setItem("shopPoints",points)

localStorage.setItem("skillPoints_"+character,points)

document.getElementById("points").innerText=points

render()

}

function back(){

window.location.href="gra.html"

}

render()

</script>
</body>
