<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Wybór ziutka</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #1e1e1e;
    color: white;
    text-align: center;
}

h1 {
    margin-top: 80px;
}

.characters {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 40px;
}

.character {
    width: 180px;
    padding: 15px;
    border: 2px solid white;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
    background-color: #2a2a2a;
}

.character:hover {
    background-color: #444;
    transform: scale(1.05);
}


.image-box {
    width: 100%;
    height: 150px;
    background-image: url("Gemini_Generated_Image_fyjik0fyjik0fyji.png"); 
    background-size: cover;
    background-position: center;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}



.image-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.image-box1 {
    width: 100%;
    height: 150px;
    background-image: url("Gemini_Generated_Image_zl545zl545zl545z.png"); 
    background-size: cover;
    background-position: center;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}


.image-box1 img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}


.character-name {
    margin-top: 10px;
    font-weight: bold;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>Wybierz swojego ziutka</h1>

<div class="characters">

    <div class="character" onclick="selectCharacter('kot')">
        <div class="image-box">
            <img src="Gemini_Generated_Image_dbamlbdbamlbdbam-removebg-preview.png" alt="kot">
        </div>
        <div class="character-name">kot</div>
    </div>

    <div class="character" onclick="selectCharacter('pies')">
        <div class="image-box">
            <img src="Gemini_Generated_Image_1gv5471gv5471gv5-removebg-preview.png" alt="pies">
        </div>
        <div class="character-name">pies</div>
    </div>

    <div class="character" onclick="selectCharacter('lis')">
        <div class="image-box">
            <img src="Gemini_Generated_Image_ahddp8ahddp8ahdd-removebg-preview.png" alt="lis">
        </div>
        <div class="character-name">lis</div>
    </div>

    <div class="character" onclick="selectCharacter('akselotl')">
        <div class="image-box1">
            <img src="Gemini_Generated_Image_m1v7eqm1v7eqm1v7-removebg-preview.png" alt="akselotl">
        </div>
        <div class="character-name">akselotl</div>
    </div>

</div>

<script>
function selectCharacter(character) {
    localStorage.setItem("selectedCharacter", character);
    window.location.href = "gra.html";
}
</script>

</body>
</html>
